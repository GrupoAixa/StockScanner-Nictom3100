<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>StockScanner — Control de Inventario</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ── LOGIN ─────────────────────────────────────────────── -->
  <div id="login-view" class="login-view">
    <div class="login-card">
      <div class="login-logo">⬡</div>
      <h1>StockScanner</h1>
      <p class="subtitle">Control de Inventario — Pañol</p>

      <div id="login-user-select" class="login-users">
        <button class="user-btn" data-user="admin">Admin</button>
        <button class="user-btn" data-user="sergio">Sergio</button>
        <button class="user-btn" data-user="leo">Leo</button>
      </div>

      <form id="login-password-form" class="login-password-form hidden">
        <p id="login-selected-user" class="login-selected-user"></p>
        <input type="password" id="login-password" placeholder="Contraseña" autocomplete="current-password" autofocus />
        <button type="submit" id="login-submit">Ingresar</button>
        <button type="button" id="login-back" class="link-btn">← Elegir otro usuario</button>
      </form>

      <p id="login-error" class="error hidden"></p>
      <p id="login-status" class="status hidden">Conectando…</p>
    </div>
  </div>

  <!-- ── APP ───────────────────────────────────────────────── -->
  <div id="app-view" class="app-view hidden">
    <div class="sidebar">
      <div class="logo-frame">
        <div class="logo">⬡</div>
        <div class="app-title">StockScanner</div>
        <div class="app-subtitle">Control de Inventario</div>
      </div>
      <div class="divider"></div>

      <nav id="nav-buttons">
        <button class="nav-btn" data-tab="scanner">
          <span class="nav-main">◉  Escanear</span>
          <span class="nav-sub">Registrá movimientos</span>
        </button>
        <button class="nav-btn" data-tab="stock">
          <span class="nav-main">☰  Inventario</span>
          <span class="nav-sub">Ver y editar stock</span>
        </button>
        <button class="nav-btn" data-tab="historial">
          <span class="nav-main">⏱  Historial</span>
          <span class="nav-sub">Movimientos recientes</span>
        </button>
        <button class="nav-btn" data-tab="productos">
          <span class="nav-main">＋  Productos</span>
          <span class="nav-sub">Agregar / editar</span>
        </button>
        <button class="nav-btn" data-tab="alertas" id="nav-alertas">
          <span class="nav-main">⚠  Alertas</span>
          <span class="nav-sub">Stock bajo mínimo</span>
        </button>
      </nav>

      <div class="sidebar-bottom">
        <div class="divider"></div>
        <div id="logged-in-as" class="logged-in-as"></div>
        <button id="logout-btn" class="logout-btn">Cerrar sesión</button>
        <div class="scanner-status">● Nictom 3100 — HID</div>
      </div>
    </div>

    <div class="content" id="content"></div>
  </div>

  <!-- ── MODAL: editar stock manual ───────────────────────── -->
  <div id="edit-stock-modal" class="modal hidden">
    <div class="modal-card">
      <h2>✎ Editar stock manualmente</h2>
      <p id="edit-stock-producto" class="modal-producto"></p>
      <label>Stock actual</label>
      <p id="edit-stock-actual" class="modal-actual"></p>
      <label for="edit-stock-nuevo">Nuevo stock</label>
      <input type="number" id="edit-stock-nuevo" min="0" step="1" />
      <label for="edit-stock-motivo">Motivo</label>
      <input type="text" id="edit-stock-motivo" placeholder="Ej: conteo físico, corrección…" />
      <div class="modal-actions">
        <button id="edit-stock-confirm" class="btn-accent">Guardar</button>
        <button id="edit-stock-cancel" class="btn-secondary">Cancelar</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="config.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
